<h1 id="o-problema">O problema</h1>
<p>As demandas internas de TI chegam por <strong>WhatsApp e e-mail</strong>, sem controle:</p>
<ul>
<li>Sem backlog estruturado</li>
<li>Sem priorização formal</li>
<li>Sem SLA</li>
<li>Sem histórico de mudanças</li>
<li>Sem rastreabilidade das entregas</li>
</ul>
<p><strong>Objetivo:</strong> um portal onde as áreas (Comercial, Atendimento, Financeiro, Marketing, Jurídico,<br />
Operações) abrem solicitações para TI e acompanham todo o ciclo — com governança e métricas.</p>
<footer>DevFlow — Portal de Gestão de Demandas de TI</footer>
</section>

<h1 id="abordagem-e-stack">Abordagem e stack</h1>
<blockquote>
<p>Começar simples, escalar por evidência. Cada decisão justificada.</p>
</blockquote>
<table>
<thead>
<tr>
<th>Camada</th>
<th>Escolha</th>
</tr>
</thead>
<tbody>
<tr>
<td>Front-end</td>
<td><strong>Next.js 16</strong> (React, SSR/RSC)</td>
</tr>
<tr>
<td>Back-end</td>
<td><strong>NestJS</strong> — monólito modular por bounded context</td>
</tr>
<tr>
<td>Dados</td>
<td><strong>PostgreSQL 16</strong> + <strong>Redis</strong> (cache/fila)</td>
</tr>
<tr>
<td>Identidade</td>
<td><strong>Keycloak</strong> (IAM) — SSO OIDC + RBAC</td>
</tr>
<tr>
<td>Assíncrono</td>
<td><strong>BullMQ</strong> (notificações, SLA, intake)</td>
</tr>
<tr>
<td>Inteligência</td>
<td><strong>WhatsApp Business API</strong> + <strong>LLM</strong> (classifica/prioriza)</td>
</tr>
<tr>
<td>Infra</td>
<td><strong>Docker</strong> + <strong>AWS</strong> (SP) · IaC <strong>Terraform</strong> · CI/CD <strong>GitHub Actions</strong></td>
</tr>
</tbody>
</table>
<footer>DevFlow — Portal de Gestão de Demandas de TI</footer>

<h1 id="2-m%C3%B3dulos-bounded-contexts">2. Módulos (bounded contexts)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>src/modules/
├── identity/    demands/    comments/
├── attachments/ sla/        notifications/
└── audit/       intake/     reports/
</code></pre>
<p>Cada módulo é isolado e comunica-se por interfaces/eventos. Um módulo que precise escalar sozinho<br />
(ex.: <code>intake</code>, <code>notifications</code>) <strong>já está pronto para virar microserviço</strong> — sem reescrita.</p>

<h1 id="2-decis%C3%B5es-registradas-adrs">2. Decisões registradas (ADRs)</h1>
<ul>
<li><strong>ADR-001</strong> — Monólito modular &gt; microserviços (complexidade sem retorno a 100 usuários)</li>
<li><strong>ADR-002</strong> — PostgreSQL (ACID no workflow; JSONB para flexibilidade)</li>
<li><strong>ADR-003</strong> — Assíncrono por fila (não bloquear request; resiliência)</li>
<li><strong>ADR-004</strong> — Auth stateless JWT + SSO OIDC (escala horizontal)</li>
</ul>
<footer>DevFlow — Portal de Gestão de Demandas de TI</footer>

<h1 id="3-hist%C3%B3rico-e-auditoria">3. Histórico e auditoria</h1>
<p>Duas tabelas <strong>append-only</strong>, resolvendo a dor de rastreabilidade:</p>
<ul>
<li><strong><code>DEMAND_HISTORY</code></strong> — mudanças de negócio (campo, antes → depois, autor, quando)</li>
<li><strong><code>AUDIT_LOG</code></strong> — ações de segurança/compliance (login, acesso a PII) para LGPD</li>
</ul>
<p><strong>Decisões:</strong> UUID (segurança/sharding), status/prioridade como tabelas (workflow configurável),<br />
JSONB para flexibilidade, anexos em S3, outbox para consistência de eventos.</p>
<footer>DevFlow — Portal de Gestão de Demandas de TI</footer>

<h1 id="6-seguran%C3%A7a-e-lgpd">6. Segurança e LGPD</h1>
<ul>
<li><strong>AuthN:</strong> <strong>Keycloak</strong> (IAM) — SSO OIDC + MFA + JWT; identidade e papéis centralizados</li>
<li><strong>AuthZ:</strong> RBAC com guards + Row-Level Security</li>
<li><strong>Cripto:</strong> TLS 1.3 (trânsito) + AES-256 (repouso) + Argon2id (senhas)</li>
<li><strong>Auditoria:</strong> trilha append-only e imutável</li>
<li><strong>LGPD:</strong> minimização, <strong>anonimização</strong> (preserva auditoria), log de acesso a PII, retenção</li>
</ul>
<footer>DevFlow — Portal de Gestão de Demandas de TI</footer>
